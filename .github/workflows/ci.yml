name: CI — Best Cars Dealership

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Python / Django ─────────────────────────────────────────────────────
  django-tests:
    name: Django Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 server/ --max-line-length=120 --exclude=server/djangoproj/__pycache__,server/frontend

      - name: Run Django migrations and tests
        working-directory: server
        env:
          DJANGO_SETTINGS_MODULE: djangoproj.settings
          NODE_SERVICE_URL: http://localhost:3030
          SENTIMENT_SERVICE_URL: http://localhost:5000
        run: |
          python manage.py migrate
          python manage.py test djangoapp

  # ── JavaScript / Node ────────────────────────────────────────────────────
  node-lint:
    name: Node.js Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node service deps
        working-directory: database
        run: npm ci

      - name: Install React deps
        working-directory: server/frontend
        run: npm ci

      - name: Build React app
        working-directory: server/frontend
        run: npm run build

  # ── Docker build check ──────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [django-tests, node-lint]

    steps:
      - uses: actions/checkout@v4

      - name: Build Node service image
        run: docker build -f docker/Dockerfile.node -t bestcars-node ./database

      - name: Build Sentiment service image
        run: docker build -f docker/Dockerfile.sentiment -t bestcars-sentiment ./sentiment
